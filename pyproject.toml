[tool.poetry]
name = "maison-estimateur"
version = "0.1.0"
description = "Outil d'analyse du marché immobilier parisien"
authors = ["Oumar Abdramane ALLAWAN", "Dimitri DELPECH", "Minan Jean-Marc OUATTARA", "Simon MALHEY", "Dominique MUSITELLI"]
readme = "README.md"
packages = [
  { include = "maison_estimateur", from = "src" }
]

[tool.poetry.dependencies]
python = "^3.8"
streamlit = "^1.29.0"
pandas = "^2.1.0"
matplotlib = "^3.8.0"
plotly = "^5.18.0"
statsmodels = "^0.14.0"
scikit-learn = "^1.3.0"
numpy = "^1.24.0"
seaborn = "^0.13.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.4.0"
pytest-cov = "^4.1.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
